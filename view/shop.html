<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link rel="stylesheet" href="../style/theme.css">
    <link rel="stylesheet" href="../style/view.css">
</head>
<body class="has-cart-dock">
    <header>
        <div data-include="/components/navbar.html"></div>
        <h1 id="shop-title">Shop</h1>
    </header>

    <main>
        <section id="shop-info"></section>
        <section class="shop-menu-layout">
            <aside class="menu-sidebar">
                <h2>Categories</h2>
                <div id="menu-categories" class="menu-categories"></div>
            </aside>
            <div class="menu-content-wrap">
                <h2>Menu</h2>
                <div id="menu-list" class="menu-list"></div>
            </div>
        </section>
        <aside id="cart-panel" class="cart-panel cart-dock"></aside>
    </main>

    <div data-include="/components/footer.html"></div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/shopdata.js"></script>
    <script src="../assets/js/shops-fixed-data.js"></script>
    <script src="../assets/js/shops.js"></script>
    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/orders.js"></script>
</body>
</html>
