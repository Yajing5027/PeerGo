<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerGo Post Request</title>
    <link rel="stylesheet" href="../style/theme.css">
    <link rel="stylesheet" href="../style/view.css">
</head>
<body>
    <header>
        <div data-include="/components/navbar.html"></div>
        <h1>Post an Errand Request</h1>
    </header>

    <main>
        <form id="add-post-form">
            <h2>Request Details</h2>

            <div>
                <label for="request-content">Request Content</label>
                <input id="request-content" name="content" type="text" placeholder="e.g., Pick up my package" required>
            </div>

            <div>
                <label for="pickup-location">Pickup Location</label>
                <select name="pickup-location" id="pickup-location" required>
                    <option value="">Please select</option>
                    <option value="Dorm">Dorm</option>
                    <option value="Library">Library</option>
                    <option value="Office">Office</option>
                    <option value="Parking Lot">Parking Lot</option>
                    <option value="Dining Hall">Dining Hall</option>
                    <option value="Gym">Gym</option>
                    <option value="Other">Other</option>
                </select>
                <input type="text" id="custom-pickup" name="custom-pickup" hidden placeholder="Enter a custom pickup location">
            </div>

            <div>
                <label for="delivery-location">Delivery Location</label>
                <select name="delivery-location" id="delivery-location" required>
                    <option value="">Please select</option>
                    <option value="Dorm">Dorm</option>
                    <option value="Library">Library</option>
                    <option value="Office">Office</option>
                    <option value="Parking Lot">Parking Lot</option>
                    <option value="Dining Hall">Dining Hall</option>
                    <option value="Gym">Gym</option>
                    <option value="Other">Other</option>
                </select>
                <input type="text" id="custom-delivery" name="custom-delivery" hidden placeholder="Enter a custom delivery location">
            </div>

            <div>
                <label for="reward">Reward</label>
                <input id="reward" name="reward" type="text" placeholder="e.g., 5" required>
            </div>

            <div>
                <button type="submit">Post</button>
                <button type="reset">Reset</button>
                <button type="button" id="cancel-button">Cancel</button>
            </div>
        </form>
    </main>

    <div data-include="/components/footer.html"></div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/add.js"></script>
</body>
</html>
