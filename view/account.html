<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerGo Account</title>
    <link rel="stylesheet" href="../style/theme.css">
    <link rel="stylesheet" href="../style/view.css">
</head>
<body>
    <header>
        <div data-include="/components/navbar.html"></div>
        <h1>Account Settings</h1>
        <p>Manage your profile details and password for testing and daily use.</p>
    </header>

    <main>
        <section id="account-overview" aria-labelledby="account-overview-title">
            <h2 id="account-overview-title">Profile Overview</h2>
            <div class="account-grid">
                <div class="account-row">
                    <span class="account-key">Email</span>
                    <span class="account-value" id="account-email">-</span>
                </div>
                <div class="account-row">
                    <span class="account-key">Role</span>
                    <span class="account-value" id="account-role">-</span>
                </div>
                <div class="account-row">
                    <span class="account-key">Display Name</span>
                    <span class="account-value" id="account-display-name">-</span>
                </div>
                <div class="account-row">
                    <span class="account-key">Created At</span>
                    <span class="account-value" id="account-created-at">-</span>
                </div>
            </div>
        </section>

        <form id="profile-form" aria-labelledby="profile-form-title">
            <h2 id="profile-form-title">Edit Profile</h2>
            <div>
                <label for="display-name">Display Name</label>
                <input id="display-name" name="display-name" type="text" maxlength="40" placeholder="Enter your display name">
            </div>
            <div>
                <button type="submit">Save Profile</button>
            </div>
            <p id="profile-message" aria-live="polite"></p>
        </form>

        <form id="password-form" aria-labelledby="password-form-title">
            <h2 id="password-form-title">Change Password</h2>
            <div>
                <label for="current-password">Current Password</label>
                <input id="current-password" name="current-password" type="password" minlength="8" maxlength="20" placeholder="Enter current password" required>
            </div>
            <div>
                <label for="new-password">New Password</label>
                <input id="new-password" name="new-password" type="password" minlength="8" maxlength="20" placeholder="8-20 chars, include letters and numbers" required>
            </div>
            <div>
                <label for="confirm-password">Confirm New Password</label>
                <input id="confirm-password" name="confirm-password" type="password" minlength="8" maxlength="20" placeholder="Re-enter the new password" required>
            </div>
            <div>
                <button type="submit">Update Password</button>
            </div>
            <p id="password-message" aria-live="polite"></p>
        </form>
    </main>

    <div data-include="/components/footer.html"></div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/account.js"></script>
</body>
</html>
