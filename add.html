<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MavSide Post Task</title>
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="style/view.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header aria-label="Post task page header">
        <div data-include="components/navbar.html"></div>
        <div class="page-title-row">
            <h1>Post Task</h1>
        </div>
        <p class="hall-slogan">Paths cross. Things arrive. Campus, closer.</p>
    </header>

    <main id="main-content" role="main" aria-label="Post Task">
        <form id="add-post-form" aria-label="Post task form">
            <h2>Task Details</h2>

            <div>
                <label for="request-content">Title</label>
                <input id="request-content" name="content" type="text" placeholder="e.g., Pick up my package" required>
            </div>

            <div id="type-component" role="group" aria-label="Task type field"></div>

            <div id="pickup-location-component" role="group" aria-label="Pickup location field"></div>

            <div id="delivery-location-component" role="group" aria-label="Delivery location field"></div>

            <div id="reward-component" role="group" aria-label="Reward field"></div>

            <div id="note-component" role="group" aria-label="Task note field"></div>

            <div>
                <label for="deliver-at">Deliver By</label>
                <input id="deliver-at" name="deliver-at" type="datetime-local" lang="en-US" placeholder="Select date and time">
                <small id="deliver-at-us-preview" class="account-muted" aria-live="polite"></small>
            </div>

            <div>
                <button type="submit">Post</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/account.js"></script>
    <script src="assets/js/form-components.js"></script>
    <script src="assets/js/add.js"></script>
</body>
</html>
