<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Errand Delivery Detail</title>
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="style/view.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header aria-label="Errand detail page header">
        <div data-include="components/navbar.html"></div>
        <h1>Delivery Detail</h1>
    </header>

    <main id="main-content" role="main" aria-label="Errand detail">
        <section aria-labelledby="errand-overview-title">
            <h2 id="errand-overview-title">Task Overview</h2>
            <div id="errand-detail-overview" role="region" aria-live="polite"></div>
        </section>

        <section aria-labelledby="errand-note-title">
            <h2 id="errand-note-title">User Note</h2>
            <div id="errand-detail-note" role="region" aria-live="polite"></div>
        </section>

        <section aria-labelledby="errand-actions-title">
            <h2 id="errand-actions-title">Actions</h2>
            <div id="errand-detail-progress" style="margin-bottom:10px;" role="status" aria-live="polite"></div>
            <div class="cart-buttons">
                <button id="errand-detail-back" type="button" aria-label="Back to previous page">Back</button>
            </div>
        </section>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/task-progress.js"></script>
    <script src="assets/js/errands-model.js"></script>
    <script src="assets/js/errand-detail.js"></script>
</body>
</html>
