<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MavSide - My Tasks</title>
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="style/view.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
        <div data-include="components/navbar.html"></div>
        <h1>My Tasks</h1>
        <p>Browse your tasks by status, type, and role.</p>
    </header>

    <main id="main-content" role="main" aria-label="My Tasks Management">
        <section aria-label="Task Status Tabs">
            <div id="manage-status-summary" style="margin-bottom: 10px;"></div>

            <div class="task-filter-row">
                <span class="task-filter-item">
                    <label for="task-role-filter">Role</label>
                    <select id="task-role-filter">
                        <option value="all">All</option>
                        <option value="poster">Poster</option>
                        <option value="bringer">Bringer</option>
                    </select>
                </span>
                <span class="task-filter-item">
                    <label for="task-type-filter">Type</label>
                    <select id="task-type-filter">
                        <option value="all">All</option>
                        <option value="order">Order</option>
                        <option value="errand">Errand</option>
                    </select>
                </span>
            </div>

            <div id="unified-task-list"></div>
        </section>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/logger.js"></script>
    <script src="assets/js/modal.js"></script>
    <script src="assets/js/status-summary-component.js"></script>
    <script src="assets/js/task-progress.js"></script>
    <script src="assets/js/errands-model.js"></script>
    <script src="assets/js/orders.js"></script>
    <script src="assets/js/manage-orders.js"></script>
    <script src="assets/js/manage.js"></script>
</body>
</html>
